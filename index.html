<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CALCULATOR </title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./images/logo.ico">
    <script src="./main.js" defer> </script>
</head>
<body>

   <div class="calc">
        <div class="calc__frame">
            
            <div class="calc__frame-output">

                <p class="preview"> Preview </p>
                
                <p class="output"> Result </p>
                
            </div>

            <div class="calc__buttons">

                <button class="bin calc__buttons-button"> <img class="bin-image" src="./images/bin.svg"> </button>
                <button class="multiply operator calc__buttons-button"> × </button>
                <button class="operator calc__buttons-button"> / </button>
                <button class="backspace calc__buttons-button"> <img class="backspace-image" src="./images/backspace.svg"> </button>

                <button class="digit calc__buttons-button"> 7 </button>
                <button class="digit calc__buttons-button"> 8 </button>
                <button class="digit calc__buttons-button"> 9 </button>
                <button class="operator calc__buttons-button"> - </button>

                <button class="digit calc__buttons-button"> 4 </button>
                <button class="digit calc__buttons-button"> 5 </button>
                <button class="digit calc__buttons-button"> 6 </button>
                <button class="operator calc__buttons-button"> + </button>

                <button class="digit calc__buttons-button"> 1 </button>
                <button class="digit calc__buttons-button"> 2 </button>
                <button class="digit calc__buttons-button"> 3 </button>
                
                <button class="equal calc__buttons-button"> = </button>
                <button class="digit zero calc__buttons-button"> 0 </button>
                
                

            </div>

        </div>
   </div>

</body>
</html>
